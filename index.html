<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Hololingo VR System | Pico's World</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body>

    <a-scene vr-mode-ui="enabled: true">
        
        <a-assets>
            <a-asset-item id="pico-model" src="assets/Parrot.glb"></a-asset-item>
            
            <audio id="snd-hello" src="assets/hello.mp3"></audio>
            <audio id="snd-father" src="assets/father.mp3"></audio>
            <audio id="snd-mother" src="assets/mother.mp3"></audio>
        </a-assets>

        <a-entity id="env" environment="preset: forest; shadow: true; dressingAmount: 100"></a-entity>

        <a-entity id="pico" 
                  gltf-model="#pico-model" 
                  position="0 0.5 -3" 
                  rotation="0 0 0" 
                  scale="0.05 0.05 0.05"
                  animation-mixer>
        </a-entity>

        <a-entity id="unit-content"></a-entity>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor fuse="true" 
                      fuse-timeout="1500" 
                      color="#FFD166" 
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500; startEvents: fusing">
            </a-cursor>
        </a-entity>

    </a-scene>

    <script>
        // دالة قراءة رقم اليونيت من الرابط (e.g. ?unit=1)
        const urlParams = new URLSearchParams(window.location.search);
        const unit = urlParams.get('unit');
        
        const content = document.getElementById('unit-content');
        const env = document.getElementById('env');

        // وظيفة تشغيل الصوت
        function playSnd(id) {
            const s = document.querySelector(id);
            if (s) s.play();
        }

        // --- منطق تبديل الوحدات ---
        
        if (unit === '1') {
            // Unit 1: Hello
            env.setAttribute('environment', 'preset: dream');
            content.innerHTML = `
                <a-text value="Hello! I am Pico!" align="center" position="0 2.5 -3" color="#2d3436" width="6"></a-text>
                <a-text value="Welcome to Hololingo" align="center" position="0 2.1 -3" color="#4a4a4a" width="4"></a-text>
            `;
            // نطق الترحيب بعد ثانيتين
            setTimeout(() => playSnd('#snd-hello'), 2000);

        } else if (unit === '2') {
            // Unit 2: Family
            env.setAttribute('environment', 'preset: contact');
            content.innerHTML = `
                <a-entity id="target-father" position="-1.5 0.6 -3">
                    <a-box color="#00A8E8" width="0.6" height="1.2" depth="0.5">
                        <a-text value="FATHER" align="center" position="0 0.8 0"></a-text>
                    </a-box>
                </a-entity>
                
                <a-entity id="target-mother" position="1.5 0.6 -3">
                    <a-box color="#EF476F" width="0.6" height="1.1" depth="0.5">
                        <a-text value="MOTHER" align="center" position="0 0.8 0"></a-text>
                    </a-box>
                </a-entity>
            `;

            // التفاعل الصوتي عند "النظر" للمجسمات
            document.getElementById('target-father').addEventListener('mouseenter', () => playSnd('#snd-father'));
            document.getElementById('target-mother').addEventListener('mouseenter', () => playSnd('#snd-mother'));
        }

        // تحسين الأداء: Fullscreen عند دخول وضع الـ VR
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('enter-vr', function () {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        });
    </script>
</body>
</html>
