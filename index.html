<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Pico VR System - Hololingo Kids</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets id="asset-loader">
        <a-asset-item id="pico-model" src="assets/pico.glb"></a-asset-item>
      </a-assets>

      <a-entity id="env" environment="preset: forest;"></a-entity>

      <a-entity id="pico" gltf-model="#pico-model" position="0 1.2 -2.5" rotation="0 180 0"></a-entity>

      <a-entity id="unit-content" position="0 0 0"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor fuse="true" fuse-timeout="1500" color="#FFD166"></a-cursor>
      </a-entity>
    </a-scene>

    <script>
      // دالة ذكية لقراءة رقم اليونيت من اللينك
      const urlParams = new URLSearchParams(window.location.search);
      const unit = urlParams.get('unit'); // هيقرأ مثلاً ?unit=6

      const content = document.getElementById('unit-content');
      const env = document.getElementById('env');

      // بناء المحتوى بناءً على رقم اليونيت
      if (unit === '6') {
        env.setAttribute('environment', 'preset: forest');
        content.innerHTML = `
          <a-sphere position="-1.5 1.2 -3" color="red" radius="0.3">
            <a-text value="APPLE" align="center" position="0 0.6 0"></a-text>
          </a-sphere>
          <a-box position="1.5 1.2 -3" color="white" width="0.4" height="0.7" depth="0.4">
            <a-text value="MILK" align="center" position="0 0.6 0"></a-text>
          </a-box>
        `;
      } else if (unit === '17') {
        env.setAttribute('environment', 'preset: goldmine');
        content.innerHTML = `
          <a-text value="1 2 3 4 5" position="0 2 -3" align="center" color="gold" width="10"></a-text>
        `;
      }
    </script>
  </body>
</html>
